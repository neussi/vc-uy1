Listen 9090
<VirtualHost *:9090>
    ServerName vc-uy1.npe-techs.com
    DocumentRoot /var/www/vc-uy1/frontend/dist

    <Directory /var/www/vc-uy1/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /sync http://127.0.0.1:6123/sync
    ProxyPassReverse /sync http://127.0.0.1:6123/sync
    
    ProxyPass /stats http://127.0.0.1:6123/stats
    ProxyPassReverse /stats http://127.0.0.1:6123/stats
    
    ProxyPass /feed http://127.0.0.1:6123/feed
    ProxyPassReverse /feed http://127.0.0.1:6123/feed

    ProxyPass /register http://127.0.0.1:6123/register
    ProxyPassReverse /register http://127.0.0.1:6123/register

    ProxyPass /token http://127.0.0.1:6123/token
    ProxyPassReverse /token http://127.0.0.1:6123/token

    ProxyPass /export http://127.0.0.1:6123/export
    ProxyPassReverse /export http://127.0.0.1:6123/export

    # SPA Support
    FallbackResource /index.html

    ErrorLog ${APACHE_LOG_DIR}/vc_uy1_error.log
    CustomLog ${APACHE_LOG_DIR}/vc_uy1_access.log combined
</VirtualHost>