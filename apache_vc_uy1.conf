<VirtualHost *:80>
    ServerName vc-uy1.npe-techs.com

    # Bypassing Cloudflare/Proxy header conflicts
    ProxyPreserveHost Off
    ProxyRequests Off

    <Proxy *>
        Order deny,allow
        Allow from all
    </Proxy>

    ProxyPass / http://127.0.0.1:76123/
    ProxyPassReverse / http://127.0.0.1:76123/

    ErrorLog ${APACHE_LOG_DIR}/vc_uy1_error_debug.log
    CustomLog ${APACHE_LOG_DIR}/vc_uy1_access_debug.log combined
</VirtualHost>