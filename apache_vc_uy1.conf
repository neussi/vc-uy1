<VirtualHost *:80 *:443>
    ServerName vc-uy1.npe-techs.com
    ServerAlias npe-techs.com

    AllowEncodedSlashes NoDecode
    ProxyPreserveHost On

    ProxyPass / http://127.0.0.1:76123/
    ProxyPassReverse / http://127.0.0.1:76123/

    ErrorLog ${APACHE_LOG_DIR}/vc_uy1_error.log
    CustomLog ${APACHE_LOG_DIR}/vc_uy1_access.log combined
</VirtualHost>