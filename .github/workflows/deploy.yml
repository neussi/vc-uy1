name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p /var/www/vc-uy1
            cd /var/www/vc-uy1
            # In a real scenario, we'd use git pull or rsync
            # For now, let's assume this script handles the update
            # (Note: Files need to be transferred first)

      - name: Transfer files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "/var/www/vc-uy1"

      - name: Restart Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/vc-uy1
            # Enable modules & Set priority
            a2enmod proxy proxy_http rewrite
            a2dissite 000-default || true
            ufw allow 9090/tcp || true
            # Link config
            cp apache_vc_uy1.conf /etc/apache2/sites-available/vc-uy1.conf
            a2ensite vc-uy1
            systemctl reload apache2
            chmod +x start_server.sh
            ./start_server.sh &
            
            # Run diagnostics and save to file for remote retrieval
            chmod +x diagnose.sh
            ./diagnose.sh > diag_result.txt 2>&1
