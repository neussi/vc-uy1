name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Sync Code via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 10m
          script: |
            mkdir -p /var/www/vc-uy1
            cd /var/www/vc-uy1
            if [ ! -d .git ]; then
              git clone https://github.com/neussi/vc-uy1.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

      - name: Overlay Distribution
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 5m
          source: "frontend/dist"
          target: "/var/www/vc-uy1/frontend"
          strip_components: 1

      - name: Finalize Infrastructure
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /var/www/vc-uy1
            # Ensure proper permissions
            chmod +x start_server.sh
            # Reload Apache for SSL/Reverse Proxy
            systemctl reload apache2
            # Restart Application
            bash start_server.sh &
