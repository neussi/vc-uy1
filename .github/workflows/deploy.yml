name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 15m
          script: |
            mkdir -p /var/www/vc-uy1
            cd /var/www/vc-uy1
            if [ ! -d .git ]; then
              git clone https://github.com/neussi/vc-uy1.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi
            
            # Use scp-like overlay manually via git or just wait for scp action
            # Actually, we still need to upload the 'dist' folder from the runner

      - name: Overlay Distribution
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          timeout: 10m
          source: "frontend/dist"
          target: "/var/www/vc-uy1/frontend"
          strip_components: 1

      - name: Finalize
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Run the detached redeploy script
            nohup bash /var/www/vc-uy1/redeploy.sh > /dev/null 2>&1 &
            sleep 2
            echo "Deployment triggered."
