<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
    <defs>
        <linearGradient id="winGlow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0078D7" />
            <stop offset="100%" stop-color="#ccff00" />
        </linearGradient>
    </defs>
    <rect width="600" height="300" rx="15" fill="#111111" stroke="url(#winGlow)" stroke-width="4"/>
    
    <!-- Window Header -->
    <rect x="0" y="0" width="600" height="40" rx="15" fill="#222222" />
    <circle cx="25" cy="20" r="6" fill="#ff5f56" />
    <circle cx="45" cy="20" r="6" fill="#ffbd2e" />
    <circle cx="65" cy="20" r="6" fill="#27c93f" />
    <text x="300" y="25" font-family="'Inter', sans-serif" font-size="14" fill="#888" text-anchor="middle">vc-uy1-installer.exe</text>

    <!-- Content -->
    <g transform="translate(50, 90)">
        <path d="M 0,20 L 40,20 L 40,60 L 0,60 Z" fill="none" stroke="#0078D7" stroke-width="4"/>
        <path d="M 50,20 L 90,20 L 90,60 L 50,60 Z" fill="none" stroke="#0078D7" stroke-width="4"/>
        <path d="M 0,70 L 40,70 L 40,110 L 0,110 Z" fill="none" stroke="#0078D7" stroke-width="4"/>
        <path d="M 50,70 L 90,70 L 90,110 L 50,110 Z" fill="none" stroke="#0078D7" stroke-width="4"/>
        
        <text x="130" y="45" font-family="'Inter', sans-serif" font-size="24" fill="#ffffff" font-weight="bold">Installing Master Node</text>
        <text x="130" y="75" font-family="'Inter', sans-serif" font-size="14" fill="#aaaaaa">Registering stealth agent in background...</text>
        
        <!-- Progress Bar -->
        <rect x="130" y="100" width="350" height="10" rx="5" fill="#333" />
        <rect x="130" y="100" width="280" height="10" rx="5" fill="url(#winGlow)" />
        
        <text x="440" y="90" font-family="'Inter', sans-serif" font-size="12" fill="#ccff00">80%</text>
    </g>
</svg>
