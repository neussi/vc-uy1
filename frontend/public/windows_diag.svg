<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Glow -->
  <circle cx="300" cy="200" r="150" fill="url(#paint0_radial)" fill-opacity="0.3"/>
  <rect x="50" y="50" width="500" height="300" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Windows Frame -->
  <rect x="80" y="80" width="440" height="240" rx="12" fill="rgba(0,0,0,0.6)" stroke="rgba(204, 255, 0, 0.2)"/>
  
  <!-- Taskbar -->
  <rect x="80" y="290" width="440" height="30" rx="0 0 12 12" fill="rgba(25,25,25,0.8)"/>
  <path d="M100 300L107 300L107 307L100 307L100 300ZM110 300L117 300L117 307L110 307L110 300ZM100 310L107 310L107 317L100 317L100 310ZM110 310L117 310L117 317L110 317L110 310Z" fill="#CCFF00"/>
  
  <!-- Agent Icon in Tray -->
  <circle cx="490" cy="305" r="5" fill="#CCFF00" fill-opacity="0.8">
    <animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinity" />
  </circle>
  
  <!-- Step Visuals -->
  <g transform="translate(140, 120)">
    <rect width="320" height="120" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="20" y="40" fill="white" font-family="Arial" font-size="16" font-weight="bold">VC-UY1 Management Agent</text>
    <rect x="20" y="60" width="280" height="4" rx="2" fill="#333"/>
    <rect x="20" y="60" width="180" height="4" rx="2" fill="#CCFF00">
      <animate attributeName="width" from="0" to="280" dur="3s" repeatCount="indefinity" />
    </rect>
    <text x="20" y="90" fill="#888" font-family="Arial" font-size="12">Status: Synching with Cameroon Research Node...</text>
  </g>

  <!-- Floating Shields/Gems -->
  <path d="M520 100L540 120L520 140L500 120L520 100Z" fill="#CCFF00" fill-opacity="0.2"/>
  <path d="M70 250L90 270L70 290L50 270L70 250Z" fill="#CCFF00" fill-opacity="0.1"/>

  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 200) rotate(90) scale(150)">
      <stop stop-color="#CCFF00"/>
      <stop offset="1" stop-color="#CCFF00" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
