<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow_neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <path d="M70 210 A100 100 0 1 1 230 210" fill="none" stroke="#d4ff00" stroke-width="8" filter="url(#glow_neon)" stroke-linecap="round" />
  <path d="M90 150 Q105 130 120 150 T150 150 T180 150 T210 150" fill="none" stroke="#d4ff00" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1s" repeatCount="Indefinite" />
  </path>
  <g transform="translate(150, 150)">
    <line x1="0" y1="0" x2="-70" y2="-20" stroke="#d4ff00" stroke-width="6" stroke-linecap="round" filter="url(#glow_neon)">
      <animateTransform attributeName="transform" type="rotate" values="-10 0 0; 30 0 0; -10 0 0" dur="5s" repeatCount="Indefinite" />
    </line>
  </g>
</svg>
