<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
    <defs>
        <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ccff00" />
            <stop offset="100%" stop-color="#00ffcc" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <g transform="translate(10, 50)">
        <path d="M 0,-30 L 20,30 L 40,-30" fill="none" stroke="url(#neonGlow)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
        <path d="M 50,-10 L 70,-30 L 90,-30 L 90,30 L 70,30 L 70,10 Z" fill="url(#neonGlow)" filter="url(#glow)"/>
        
        <text x="120" y="15" font-family="'Inter', sans-serif" font-size="40" font-weight="900" fill="#ffffff" letter-spacing="4">
            VC-UY1
        </text>
        <text x="125" y="40" font-family="'Inter', sans-serif" font-size="12" font-weight="500" fill="#ccff00" letter-spacing="8" filter="url(#glow)">
            LABORATORY
        </text>
    </g>
</svg>
