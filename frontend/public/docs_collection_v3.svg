<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow_neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <path d="M50 50 L250 50 L180 160 L180 250 L120 250 L120 160 Z" fill="none" stroke="#d4ff00" stroke-width="5" filter="url(#glow_neon)" />
  <g>
    <rect x="140" y="30" width="20" height="12" rx="2" fill="#d4ff00" filter="url(#glow_neon)">
      <animate attributeName="y" from="0" to="150" dur="1.5s" repeatCount="Indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="Indefinite" />
    </rect>
  </g>
  <rect x="110" y="240" width="80" height="25" rx="5" fill="none" stroke="#d4ff00" stroke-width="2" />
  <circle cx="150" cy="252" r="5" fill="#d4ff00" filter="url(#glow_neon)">
    <animate attributeName="r" values="3;7;3" dur="1s" repeatCount="Indefinite" />
  </circle>
</svg>
